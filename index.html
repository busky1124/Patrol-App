<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>سامانه گشت‌زنی نگهبانی | سایدا غرب</title>

<!-- PWA: lets the app be added to the home screen and open full-screen, without Safari's address bar -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0d3d8f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="گشت‌زنی سایدا">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root{
    --bg: #ffffff;
    --panel: #f5f7fb;
    --panel-2: #eef1f8;
    --line: #dde3ee;
    --text: #16223b;
    --text-dim: #6c7688;
    --navy: #0d3d8f;
    --navy-dark: #082a66;
    --green: #1a9e6d;
    --red: #d13b3b;
    --radius: 14px;
    --font: 'Vazirmatn', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:var(--font);
    background:var(--bg);
    color:var(--text);
    min-height:100vh;
    -webkit-tap-highlight-color: transparent;
  }
  #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

  /* ---------- shared ---------- */
  .topbar{
    padding:18px 20px 14px;
    display:flex;align-items:center;gap:12px;
    border-bottom:1px solid var(--line);
    position:sticky;top:0;background:var(--bg);z-index:5;
  }
  .badge{
    width:42px;height:42px;border-radius:10px;
    background:linear-gradient(155deg,var(--navy),var(--navy-dark));
    display:flex;align-items:center;justify-content:center;
    font-weight:800;color:#fff;flex-shrink:0;font-size:16px;
    overflow:hidden;
  }
  .badge img{width:100%;height:100%;object-fit:contain;}
  .topbar h1{font-size:14.5px;margin:0;font-weight:700;line-height:1.5;color:var(--text);}
  .topbar .sub{font-size:11.5px;color:var(--navy);font-weight:600;margin-top:2px;}
  .content{flex:1;padding:20px;display:flex;flex-direction:column;gap:16px;}

  .card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:18px;
  }
  .muted{color:var(--text-dim);font-size:13px;line-height:1.9;}
  h2{font-size:15px;margin:0 0 12px;font-weight:700;color:var(--text);}
  h3{font-size:13px;margin:0 0 10px;font-weight:600;color:var(--text-dim);}

  button{font-family:var(--font);cursor:pointer;border:none;}
  .btn{
    width:100%;padding:15px 16px;border-radius:11px;
    font-size:14.5px;font-weight:700;
    background:var(--panel-2);color:var(--text);
    border:1px solid var(--line);
    transition:transform .08s ease, background .15s ease;
  }
  .btn:active{transform:scale(0.98);}
  .btn-primary{background:var(--navy);color:#fff;border-color:var(--navy);}
  .btn-primary:disabled{opacity:.4;}
  .btn-ghost{background:transparent;}
  .btn-danger{background:transparent;color:var(--red);border-color:#f0d3d3;}
  .btn-sm{width:auto;padding:9px 14px;font-size:12.5px;border-radius:9px;}
  .btn-row{display:flex;gap:10px;}
  .btn-row .btn{flex:1;}

  .guard-list{display:flex;flex-direction:column;gap:10px;}
  .guard-pick{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px;border-radius:11px;background:var(--panel-2);
    border:1px solid var(--line);font-weight:600;font-size:14.5px;
  }
  .guard-pick .arrow{color:var(--navy);font-size:16px;}

  .pill{
    display:inline-flex;align-items:center;gap:6px;
    background:var(--panel-2);border:1px solid var(--line);
    padding:6px 12px;border-radius:999px;font-size:12.5px;color:var(--text-dim);
  }
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);}

  .empty{
    text-align:center;padding:36px 12px;color:var(--text-dim);font-size:13.5px;line-height:1.9;
  }

  /* ---------- scanner ---------- */
  .scan-overlay{
    position:fixed;inset:0;background:#000;z-index:50;
    display:flex;flex-direction:column;
  }
  .scan-video-wrap{position:relative;flex:1;overflow:hidden;background:#000;}
  #video{width:100%;height:100%;object-fit:cover;display:block;}
  .scan-frame{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    width:min(70vw,280px);height:min(70vw,280px);
    border:3px solid #4d8ff0;border-radius:20px;
    box-shadow:0 0 0 2000px rgba(0,0,0,.45);
  }
  .scan-hint{
    position:absolute;bottom:26px;left:0;right:0;text-align:center;
    color:#fff;font-size:13px;padding:0 20px;
  }
  .scan-bottom{padding:16px 20px 26px;background:#000;}

  /* ---------- result ---------- */
  .result-icon{
    width:64px;height:64px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:28px;margin:0 auto 14px;
  }
  .result-icon.ok{background:rgba(26,158,109,.12);color:var(--green);}
  .result-icon.err{background:rgba(209,59,59,.12);color:var(--red);}
  .center{text-align:center;}
  .time-mono{
    font-variant-numeric:tabular-nums;color:var(--text-dim);font-size:12.5px;
    margin-top:6px;
  }

  input[type=text], input[type=password]{
    width:100%;padding:13px 14px;border-radius:10px;
    background:#fff;border:1px solid var(--line);
    color:var(--text);font-family:var(--font);font-size:14px;
  }
  input::placeholder{color:var(--text-dim);}
  input:focus{outline:2px solid var(--navy);outline-offset:1px;}

  table{width:100%;border-collapse:collapse;font-size:12.5px;}
  th,td{padding:9px 8px;text-align:right;border-bottom:1px solid var(--line);}
  th{color:var(--text-dim);font-weight:600;font-size:11.5px;}
  tbody tr:last-child td{border-bottom:none;}
  .table-wrap{overflow-x:auto;}

  .row-list{display:flex;flex-direction:column;gap:8px;}
  .row-item{
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--panel-2);border:1px solid var(--line);
    padding:10px 12px;border-radius:10px;font-size:13px;
  }
  .row-item input{padding:8px 10px;font-size:13px;}

  .toast{
    position:fixed;bottom:22px;left:50%;transform:translateX(-50%);
    background:var(--navy-dark);color:#fff;border:1px solid var(--navy-dark);
    padding:10px 18px;border-radius:999px;font-size:13px;
    z-index:80;box-shadow:0 6px 20px rgba(8,42,102,.35);
  }
  .spin{
    width:20px;height:20px;border-radius:50%;
    border:2.5px solid var(--line);border-top-color:var(--navy);
    animation:sp .7s linear infinite;margin:0 auto;
  }
  @keyframes sp{to{transform:rotate(360deg);}}

  .link-back{font-size:12px;color:var(--text-dim);text-decoration:none;}
</style>
</head>
<body>
<div id="app"></div>


<script>
(function(){
"use strict";

const ADMIN_HASH_ROUTE = "admin";
const ADMIN_PASSWORD = "Sayda@1402";
const COMPANY_NAME = "شرکت صنایع غذایی سایدا غرب";
const APP_SUBTITLE = "سامانه گشت‌زنی نگهبانی";
const LOGO_URL = ""; // paste a logo image URL here when ready

const app = document.getElementById("app");

function topbarHtml(){
  const badgeInner = LOGO_URL ? `<img src="${LOGO_URL}" alt="لوگو">` : "س";
  return `
    <div class="topbar">
      <div class="badge">${badgeInner}</div>
      <div>
        <h1>${COMPANY_NAME}</h1>
        <div class="sub">${APP_SUBTITLE}</div>
      </div>
    </div>`;
}

/* ---------------- backend (Google Apps Script Web App) ---------------- */
// After deploying the Apps Script (see setup guide), paste the Web App URL below.
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyhIi-KsHXwCzlfvgInNsQicUstR61GyjgDi24z9nShQ8X4AmJ1Blf_54oXwI_pemsZ/exec";

let DB = { guards: [], points: [], scans: [] };
let dbError = false;

async function apiGet(){
  const res = await fetch(SCRIPT_URL + "?action=getAll");
  if(!res.ok) throw new Error("bad response");
  return await res.json();
}
async function apiPost(payload){
  const res = await fetch(SCRIPT_URL, {
    method: "POST",
    headers: {"Content-Type": "text/plain;charset=utf-8"},
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error("bad response");
  return await res.json();
}
async function refreshDB(){
  if(!SCRIPT_URL){ dbError = true; return DB; }
  try{
    DB = await apiGet();
    dbError = false;
  }catch(e){
    console.error("DB load failed", e);
    dbError = true;
  }
  return DB;
}

function fmtDateTime(iso){
  const d = new Date(iso);
  try{
    return new Intl.DateTimeFormat("fa-IR-u-ca-persian-nu-latn",{dateStyle:"medium",timeStyle:"short"}).format(d);
  }catch(e){ return d.toLocaleString(); }
}

function toast(msg){
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2400);
}

function connectionErrorCard(){
  return `<div class="card empty">
    اتصال به پایگاه داده برقرار نشد.<br>
    ${SCRIPT_URL ? "لطفاً اتصال اینترنت را بررسی کنید و دوباره تلاش کنید." : "آدرس Google Apps Script هنوز در برنامه تنظیم نشده."}
    <div style="margin-top:14px;"><button class="btn btn-primary btn-sm" id="retryLoadBtn">تلاش دوباره</button></div>
  </div>`;
}

function getPoints(){ return DB.points || []; }
function getGuards(){ return DB.guards || []; }

/* ---------------- router ---------------- */
function currentHash(){ return location.hash.replace("#",""); }

function render(){
  const h = currentHash();
  if(h === ADMIN_HASH_ROUTE){
    renderAdminGate();
  } else {
    renderGuardHome();
  }
}
window.addEventListener("hashchange", render);

/* ================= GUARD FLOW ================= */

let activeGuard = sessionStorage.getItem ? null : null; // placeholder, real state below
let state = { guard: null };

async function renderGuardHome(){
  app.innerHTML = `
    ${topbarHtml()}
    <div class="content" id="content">
      <div class="card center"><div class="spin"></div></div>
    </div>
  `;
  await refreshDB();
  const content = document.getElementById("content");

  if(dbError){
    content.innerHTML = connectionErrorCard();
    document.getElementById("retryLoadBtn").onclick = renderGuardHome;
    return;
  }

  const guards = getGuards();

  function appendAdminLink(){
    const wrap = document.createElement("div");
    wrap.style.textAlign = "center";
    wrap.style.marginTop = "6px";
    wrap.innerHTML = `<a class="link-back" href="#admin">ورود مدیریت</a>`;
    content.appendChild(wrap);
  }

  if(!state.guard){
    if(guards.length === 0){
      content.innerHTML = `
        <div class="card empty">
          هنوز هیچ نگهبانی تعریف نشده.<br>
          از پنل مدیریت، نام نگهبانان را اضافه کنید.
        </div>`;
      appendAdminLink();
      return;
    }
    content.innerHTML = `
      <div class="card">
        <h2>نام خود را انتخاب کنید</h2>
        <div class="guard-list" id="glist"></div>
      </div>`;
    const glist = document.getElementById("glist");
    guards.forEach(name=>{
      const el = document.createElement("button");
      el.className = "guard-pick";
      el.innerHTML = `<span>${escapeHtml(name)}</span><span class="arrow">‹</span>`;
      el.onclick = ()=>{ state.guard = name; renderGuardHome(); };
      glist.appendChild(el);
    });
    const otherEl = document.createElement("button");
    otherEl.className = "guard-pick";
    otherEl.innerHTML = `<span>سایر...</span><span class="arrow">‹</span>`;
    otherEl.onclick = renderOtherGuardEntry;
    glist.appendChild(otherEl);
    appendAdminLink();
    return;
  }

  content.innerHTML = `
    <div class="card center">
      <div class="pill" style="margin-bottom:14px;"><span class="dot"></span> نگهبان فعال</div>
      <h2 style="font-size:18px;">${escapeHtml(state.guard)}</h2>
      <p class="muted" style="margin:6px 0 18px;">برای ثبت گشت، دکمه زیر را بزنید و کد QR نقطه را اسکن کنید.</p>
      <button class="btn btn-primary" id="scanBtn">📷 شروع اسکن</button>
    </div>
    <button class="btn btn-ghost" id="switchBtn">تغییر نگهبان</button>
  `;
  document.getElementById("scanBtn").onclick = openScanner;
  document.getElementById("switchBtn").onclick = ()=>{ state.guard=null; renderGuardHome(); };
  appendAdminLink();
}

function renderOtherGuardEntry(){
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="card">
      <h2>نام خود را وارد کنید</h2>
      <p class="muted" style="margin-bottom:12px;">برای زمانی که جای نگهبان اصلی شیفت عوض شده.</p>
      <input type="text" id="otherName" placeholder="نام و نام خانوادگی" style="margin-bottom:12px;">
      <div class="btn-row">
        <button class="btn btn-ghost" id="otherBack">بازگشت</button>
        <button class="btn btn-primary" id="otherConfirm">تایید</button>
      </div>
    </div>
  `;
  document.getElementById("otherBack").onclick = renderGuardHome;
  document.getElementById("otherConfirm").onclick = ()=>{
    const val = document.getElementById("otherName").value.trim();
    if(!val){ toast("نام را وارد کنید"); return; }
    state.guard = val;
    renderGuardHome();
  };
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* -------- scanner -------- */
let stream = null;
let scanning = false;

async function openScanner(){
  const overlay = document.createElement("div");
  overlay.className = "scan-overlay";
  overlay.id = "scanOverlay";
  overlay.innerHTML = `
    <div class="scan-video-wrap">
      <video id="video" playsinline muted></video>
      <div class="scan-frame"></div>
      <div class="scan-hint">کد QR نقطه گشت را داخل قاب قرار دهید</div>
    </div>
    <div class="scan-bottom">
      <button class="btn btn-ghost" id="cancelScan">انصراف</button>
    </div>
  `;
  document.body.appendChild(overlay);
  document.getElementById("cancelScan").onclick = closeScanner;

  try{
    stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    const video = document.getElementById("video");
    video.srcObject = stream;
    await video.play();
    scanning = true;
    scanLoop(video);
  }catch(e){
    toast("دسترسی به دوربین امکان‌پذیر نشد");
    closeScanner();
  }
}

function closeScanner(){
  scanning = false;
  if(stream){ stream.getTracks().forEach(t=>t.stop()); stream=null; }
  const overlay = document.getElementById("scanOverlay");
  if(overlay) overlay.remove();
}

function scanLoop(video){
  if(typeof jsQR !== "function"){
    toast("ماژول اسکن بارگذاری نشد — اتصال اینترنت را بررسی کنید");
    closeScanner();
    return;
  }
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d", {willReadFrequently:true});
  function tick(){
    if(!scanning) return;
    if(video.readyState === video.HAVE_ENOUGH_DATA){
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const imgData = ctx.getImageData(0,0,canvas.width,canvas.height);
      const code = window.jsQR ? jsQR(imgData.data, imgData.width, imgData.height) : null;
      if(code && code.data){
        scanning = false;
        closeScanner();
        handleDecoded(code.data);
        return;
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

async function handleDecoded(text){
  const points = getPoints();
  const match = points.find(p => p.code === text);
  const content = document.getElementById("content");
  if(!match){
    content.innerHTML = `
      <div class="card center">
        <div class="result-icon err">✕</div>
        <h2>کد شناسایی نشد</h2>
        <p class="muted">این کد با هیچ‌کدام از نقاط گشت مطابقت ندارد.</p>
        <button class="btn btn-primary" id="retryBtn" style="margin-top:8px;">تلاش دوباره</button>
      </div>`;
    document.getElementById("retryBtn").onclick = openScanner;
    return;
  }
  const now = new Date();
  content.innerHTML = `
    <div class="card center">
      <div class="result-icon ok">✓</div>
      <h2>${escapeHtml(match.name)}</h2>
      <div class="time-mono">${fmtDateTime(now.toISOString())}</div>
      <p class="muted" style="margin-top:14px;">با تایید، حضور شما در این نقطه ثبت می‌شود.</p>
      <button class="btn btn-primary" id="confirmBtn" style="margin-top:6px;">ثبت گشت</button>
      <button class="btn btn-ghost" id="cancelBtn" style="margin-top:8px;">انصراف</button>
    </div>`;
  document.getElementById("confirmBtn").onclick = async ()=>{
    const btn = document.getElementById("confirmBtn");
    btn.disabled = true; btn.textContent = "در حال ثبت...";
    const ts = new Date();
    try{
      const updated = await apiPost({action:"addScan", guard: state.guard, pointId: match.id, pointName: match.name, iso: ts.toISOString()});
      DB = updated;
      renderSuccess(match.name, ts);
    }catch(e){
      toast("ثبت انجام نشد — اتصال اینترنت را بررسی کنید");
      btn.disabled = false; btn.textContent = "ثبت گشت";
    }
  };
  document.getElementById("cancelBtn").onclick = renderGuardHome;
}

function renderSuccess(pointName, ts){
  const content = document.getElementById("content");
  content.innerHTML = `
    <div class="card center">
      <div class="result-icon ok">✓</div>
      <h2>ثبت شد</h2>
      <p class="muted">${escapeHtml(pointName)} — ${escapeHtml(state.guard)}</p>
      <div class="time-mono">${fmtDateTime(ts.toISOString())}</div>
      <button class="btn btn-primary" id="nextBtn" style="margin-top:16px;">اسکن نقطه بعدی</button>
    </div>
    <button class="btn btn-ghost" id="switchBtn2">تغییر نگهبان</button>
  `;
  document.getElementById("nextBtn").onclick = openScanner;
  document.getElementById("switchBtn2").onclick = ()=>{ state.guard=null; renderGuardHome(); };
}

/* ================= ADMIN FLOW ================= */

let adminAuthed = false;

async function renderAdminGate(){
  app.innerHTML = `
    ${topbarHtml()}
    <div class="content" id="content"><div class="card center"><div class="spin"></div></div></div>
  `;
  const content = document.getElementById("content");

  if(adminAuthed){
    renderAdminDashboard();
    return;
  }

  content.innerHTML = `
    <div class="card">
      <div class="pill" style="margin-bottom:14px;">پنل مدیریت</div>
      <h2>ورود به پنل مدیریت</h2>
      <input type="password" id="pinInput" placeholder="رمز عبور" style="margin-bottom:14px;">
      <button class="btn btn-primary" id="loginBtn">ورود</button>
    </div>
    <a class="link-back" href="#">بازگشت به صفحه نگهبانی</a>
  `;
  const doLogin = ()=>{
    const val = document.getElementById("pinInput").value;
    if(val === ADMIN_PASSWORD){ adminAuthed = true; renderAdminDashboard(); }
    else toast("رمز اشتباه است");
  };
  document.getElementById("loginBtn").onclick = doLogin;
  document.getElementById("pinInput").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
}

async function renderAdminDashboard(){
  const content = document.getElementById("content");
  content.innerHTML = `<div class="card center"><div class="spin"></div></div>`;

  await refreshDB();
  if(dbError){
    content.innerHTML = connectionErrorCard();
    document.getElementById("retryLoadBtn").onclick = renderAdminDashboard;
    return;
  }

  const points = DB.points || [];
  const guards = DB.guards || [];
  const records = (DB.scans || []).slice().sort((a,b)=> new Date(b.iso) - new Date(a.iso));

  content.innerHTML = `
    <div class="pill">پنل مدیریت</div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <h2 style="margin:0;">گزارش گشت‌ها</h2>
        <span class="pill">${records.length} ثبت</span>
      </div>
      ${records.length === 0 ? `<div class="empty">هنوز هیچ گشتی ثبت نشده.</div>` : `
      <div class="table-wrap">
        <table>
          <thead><tr><th>نگهبان</th><th>نقطه</th><th>تاریخ و ساعت</th></tr></thead>
          <tbody id="tbody"></tbody>
        </table>
      </div>`}
      <button class="btn btn-ghost" id="exportBtn" style="margin-top:14px;" ${records.length===0?"disabled":""}>خروجی CSV / اکسل</button>
    </div>

    <div class="card">
      <h3>نگهبانان</h3>
      <div class="row-list" id="guardRows"></div>
      <div style="display:flex;gap:8px;margin-top:10px;">
        <input type="text" id="newGuardName" placeholder="نام نگهبان جدید">
        <button class="btn btn-primary btn-sm" id="addGuardBtn">افزودن</button>
      </div>
    </div>

    <div class="card">
      <h3>نقاط گشت (۴ نقطه)</h3>
      <div class="row-list" id="pointRows"></div>
      <p class="muted" style="margin-top:10px;">برای دانلود QR هر نقطه، روی «QR» بزنید و آن را چاپ کرده و سر همان نقطه نصب کنید.</p>
    </div>

    <button class="btn btn-ghost" id="logoutBtn">خروج از پنل مدیریت</button>
  `;

  if(records.length){
    const tbody = document.getElementById("tbody");
    records.forEach(r=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${escapeHtml(r.guard||"-")}</td><td>${escapeHtml(r.pointName||"-")}</td><td>${fmtDateTime(r.iso)}</td>`;
      tbody.appendChild(tr);
    });
    document.getElementById("exportBtn").onclick = ()=>exportCsv(records);
  }

  const guardRows = document.getElementById("guardRows");
  if(guards.length === 0){
    guardRows.innerHTML = `<div class="muted">نگهبانی اضافه نشده</div>`;
  }
  guards.forEach(name=>{
    const row = document.createElement("div");
    row.className = "row-item";
    row.innerHTML = `<span>${escapeHtml(name)}</span>`;
    const del = document.createElement("button");
    del.className = "btn btn-danger btn-sm";
    del.textContent = "حذف";
    del.onclick = async ()=>{
      del.disabled = true;
      try{
        DB = await apiPost({action:"removeGuard", name});
        renderAdminDashboard();
      }catch(e){ toast("حذف انجام نشد"); del.disabled = false; }
    };
    row.appendChild(del);
    guardRows.appendChild(row);
  });
  document.getElementById("addGuardBtn").onclick = async ()=>{
    const input = document.getElementById("newGuardName");
    const name = input.value.trim();
    if(!name) return;
    const btn = document.getElementById("addGuardBtn");
    btn.disabled = true;
    try{
      DB = await apiPost({action:"addGuard", name});
      renderAdminDashboard();
    }catch(e){ toast("افزودن انجام نشد"); btn.disabled = false; }
  };

  const pointRows = document.getElementById("pointRows");
  points.forEach(p=>{
    const row = document.createElement("div");
    row.className = "row-item";
    row.innerHTML = `<input type="text" value="${escapeHtml(p.name)}" data-id="${p.id}">`;
    const qrBtn = document.createElement("button");
    qrBtn.className = "btn btn-ghost btn-sm";
    qrBtn.textContent = "QR";
    qrBtn.onclick = ()=>downloadQr(p);
    const saveBtn = document.createElement("button");
    saveBtn.className = "btn btn-primary btn-sm";
    saveBtn.textContent = "ذخیره";
    saveBtn.onclick = async ()=>{
      const inp = row.querySelector("input");
      const newName = inp.value.trim() || p.name;
      saveBtn.disabled = true;
      try{
        DB = await apiPost({action:"updatePoint", id: p.id, name: newName});
        toast("ذخیره شد");
      }catch(e){ toast("ذخیره انجام نشد"); }
      saveBtn.disabled = false;
    };
    row.appendChild(qrBtn);
    row.appendChild(saveBtn);
    pointRows.appendChild(row);
  });

  document.getElementById("logoutBtn").onclick = ()=>{
    adminAuthed = false;
    location.hash = "";
  };
}

function exportCsv(records){
  const header = ["نام نگهبان","نقطه","تاریخ و ساعت","تاریخ فنی (ISO)"];
  const rows = records.map(r => [r.guard||"", r.pointName||"", fmtDateTime(r.iso), r.iso]);
  const csv = [header, ...rows].map(row =>
    row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(",")
  ).join("\r\n");
  const blob = new Blob(["\uFEFF"+csv], {type:"text/csv;charset=utf-8;"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "گزارش-گشت-زنی.csv";
  a.click();
  URL.revokeObjectURL(url);
}

function downloadQr(point){
  const holder = document.createElement("div");
  holder.style.display = "none";
  document.body.appendChild(holder);
  new QRCode(holder, {text: point.code, width: 512, height: 512, correctLevel: QRCode.CorrectLevel.H});
  setTimeout(()=>{
    const canvas = holder.querySelector("canvas");
    const img = holder.querySelector("img");
    const src = canvas ? canvas.toDataURL("image/png") : (img ? img.src : null);
    if(src){
      const a = document.createElement("a");
      a.href = src;
      a.download = `qr-${point.id}.png`;
      a.click();
    }
    holder.remove();
  }, 150);
}

/* ---------------- boot ---------------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
render();

})();
</script>
